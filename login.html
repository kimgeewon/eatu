<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EAT-U Login</title>
    <!-- reset -->
    <link rel="stylesheet" href="css/reset.css" />
    <!-- login -->
    <link rel="stylesheet" href="css/login.css" />
  </head>
  <body>
    <!-- 헤더 -->
    <header class="login-header">
      <div class="logo">
        <a href="index.html">
          <img src="images/logo-img.png" alt="메인페이지 잇유 로고" />
          <img src="images/logo-text.png" alt="메인페이지 잇유 로고 타이포" />
        </a>
      </div>

      <nav class="nav">
        <ul class="menu-list">
          <li>
            <a class="nav-item" href="#">밥 먹을래?</a>
          </li>
          <li>
            <a href="sub-page1.html">같이 가자!</a>
          </li>
          <li>
            <a href="sub-page2.html">이거 좋아해?</a>
            </li>
          <li>
            <a class="nav-item" href="#">지금 우리 동네는</a>
          </li>
        </ul>
      </nav>
      <button class="hamburger">
        <img src="images/햄버거.png" alt="햄버거" />
      </button>
    </header>

    <!-- main -->
    <main class="login-section">
      <section class="login-wrap">
        <a href="index.html">
        <div class="login-logo">
          <img src="images/main-logo-black.png" alt="잇유로고" />
          </a>
          <p>login...</p>
        </div>
        <form action="#">
          <input
            type="text"
            name="userid"
            placeholder="전화번호,사용자 이름 또는 이메일"
          />
          <input type="password" name="password" placeholder="비밀번호" />
          <button type="submit">Login</button>
        </form>
        <hr class="login-bar" />
        <div class="sns-login">
          <ul class="sns-login-list">
            <li>
              <a href="#"
                ><img src="images/sns-f.png" alt="페이스북 로그인"
              /></a>
            </li>
            <li>
              <a href="#"><img src="images/sns-n.png" alt="네이버 로그인" /></a>
            </li>
            <li>
              <a href="#"><img src="images/sns-k.png" alt="카카오 로그인" /></a>
            </li>
            <li>
              <a href="#"><img src="images/sns-i.png" alt="인스타 로그인" /></a>
            </li>
          </ul>
          <div class="login-links">
            <a href="#">Forgot Password?</a>
            <a href="#">회원가입</a>
          </div>
        </div>
      </section>
    </main>
    <!-- --------------------------------------------------------------- -->
    <!-- footer -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="line"></div>
        <div>
          <ul class="sns-list">
            <li>
              <a href="#">INSTA</a>
              <img src="images/화살표.png" alt="" />
            </li>
            <li>
              <a href="#">KAKAO TALK</a>
              <img src="images/화살표.png" alt="" />
            </li>
            <li>
              <a href="#">ABOUT US</a>
              <img src="images/화살표.png" alt="" />
            </li>
            <li>
              <a href="#">LET'S MEET</a>
              <img src="images/화살표.png" alt="" />
            </li>
          </ul>
        </div>
        <div class="footer-bottom">
          <p class="company-name">EAT-U</p>
          <p class="copy">&copy; 2026 EAT-U. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <a href="#top" class="go-top">
      <img src="images/Vector.png" alt="" />
      Top
    </a>
  </body>
</html>
